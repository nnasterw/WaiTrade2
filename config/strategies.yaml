  breakeven_r: 0.5
  breakeven_lock_r: 0.2
  bounce_pct: 0.60
  max_concurrent: 1
  max_entry_offset_r: 0.5
  dtp_trigger_r: 3.0
  dtp_retrace: 0.20
  boost_in_1h_ob: 3.0
  # 势态动
  enable_state_filter: true
  enable_scoring: true
  min_score: 4
  enable_decay_exit: true
  decay_min_r: 1.0
  decay_bars: 3
  engulf_body_pct: 50
  trend_lookback: 80
  swing_strength: 3
