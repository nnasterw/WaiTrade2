# ════════════════════════════════════════════════════════════════════
# V11 BTC SMC策略 — 中胜率大盈亏比趋势追踪
# ════════════════════════════════════════════════════════════════════

v11_xau_m3_fage:
  <<: *v10_fage_dtp8_r20
  version: V11-XAU-M3-FAGE
  description: "v11组合XAU主腿: FAGE+DTP8R/r20，负责日均/WR/PF"
  magic_number: 202612

v11_btc_m5: &v11_btc_m5
  <<: *defaults
  version: V11-BTC-M5E
  description: "v11 BTC M5: 基线+debug分析盈亏规律"
  bar_period_min: 5
  bars: 300
  ob_scan_depth: 200
  magic_number: 202611
  # === 入场 ===
  enable_entry_engine: true
  entry_depth_pct: 0.67
  entry_depth_filter: true
  bounce_pct: 0.25
  max_entry_offset_r: 0.5
  require_double_touch: false
  min_risk_spread_ratio: 5.0
  min_ob_spread_mult: 2.0
  min_ob_body_pct: 50.0
  min_impulse_body_pct: 50.0
  min_impulse_vol_ratio: 1.0
  structure_break_bars: 3
  structure_break_atr: 0.1
  require_impulse_candle_dir: true
  min_ob_strength: 0.5
  max_risk_atr: 3.0
  max_counter_risk_atr: 1.5
  consolidate_ob: true
  # === 时段（全天候）===
  no_ob_start_hour: -1
  no_ob_end_hour: -1
  no_entry_hours: ""
  no_buy_hours: ""
  no_sell_hours: ""
  # === 止损 ===
  sl_buffer_atr: 1.5
  # === 保本 ===
  breakeven_r: 1.0
  breakeven_lock_r: 0.2
  # === 出场: DTP + 高BE lock ===
  dtp_trigger_r: 3.0
  dtp_retrace: 0.25
  adaptive_dtp: true
  dtp_exit_mode: 0
  dtp_partial_pct: 50
  dtp_post_partial_retrace: 0.0
  dtp_post_partial_lock_r: 0.0
  dtp_reset_peak_after_partial: false
  fixed_tp_r: 0.0
  ob_height_tp_mult: 1.5
  # === Trail全禁用 ===
  trail_levels:
    - trigger_r: 0.0
      lock_r: 0.0
      lock_mult: 0.0
    - trigger_r: 0.0
      lock_r: 0.0
      lock_mult: 0.0
    - trigger_r: 0.0
      lock_r: 0.0
      lock_mult: 0.0
  # === 状态自适应 ===
  enable_state_filter: true
  trend_lookback: 80
  swing_strength: 3
  range_be_r: 1.0
