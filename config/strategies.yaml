# MT5 Runner — 策略参数定义
# 每个策略版本一个顶层key，脚本通过 --strategy <key> 引用

defaults: &defaults
  # === OB检测 ===
  bounce_pct: 0.30
  timeout_min: 60
  max_entry_offset_r: 1.5
  require_double_touch: true
  double_touch_window_min: 60
  min_ob_spread_mult: 2.0
  min_risk_spread_ratio: 3.0
  min_abs_risk_usd: 0.0
  consolidate_ob: true
  spread_floor: 0.0

  # === 止损 ===
  sl_buffer_atr: 0.10

  # === 保本 ===
  breakeven_r: 0.2
  breakeven_lock_r: 0.05

  # === 追踪止损 ===
  trail_levels:
    - trigger_r: 1.0
      lock_r: 0.2
      lock_mult: 0.0
    - trigger_r: 2.5
      lock_r: 0.0
      lock_mult: 0.65
    - trigger_r: 0.0
      lock_r: 0.0
      lock_mult: 0.0

  # === DTP (Dynamic Take Profit) ===
  dtp_trigger_r: 1.5
  dtp_retrace: 0.30
  adaptive_dtp: true

  # === 时间退出 ===
  time_exit_bars: 999
  time_decay_tp: false

  # === 仓位管理 ===
  risk_percent: 2.0
  max_concurrent: 5
  cooldown_bars: 0

  # === 增强 ===
  boost_in_1h_ob: 3.0
  ds_weight: true
  dt_addon_boost: 0.0

  # === K线 ===
  bar_period_min: 1   # 1=M1, 5=M5
  bars: 300            # OBScanDepth=200 + ATR(14) + buffer

# === 策略版本 ===

v96b:
  <<: *defaults
  version: V96b
  description: "M1+二推+BE0.2R+DTP1.5R+3xBoost"

v96b_live:
  <<: *defaults
  version: V96b-Live
  description: "V96b live调优: 放宽BE+收紧offset+限并发"
  max_entry_offset_r: 0.8
  breakeven_r: 0.5
  breakeven_lock_r: 0.15
  max_concurrent: 2

v98:
  <<: *defaults
  version: V98
  description: "势位态动四维: M15趋势+评分+态切换+动能衰减"
  # 势: M15趋势判定
  trend_lookback: 80
  swing_strength: 3
  # 态: 趋势/震荡切换
  enable_state_filter: true
  range_be_r: 1.0
  range_time_exit: 30
  trend_be_r: 0.5
  trend_be_lock: 0.2
  trend_dtp_retrace: 0.20
  # 位: 评分系统
  enable_scoring: true
  proximity_filter: 0
  proximity_atr: 1.0
  min_score: 2
  # 动: 动能衰减
  enable_decay_exit: true
  decay_min_r: 1.0
  decay_bars: 3
  engulf_body_pct: 50
  # 基础参数(调优)
  breakeven_r: 0.5
  breakeven_lock_r: 0.2
  max_entry_offset_r: 0.8
  max_concurrent: 2
  bounce_pct: 0.40
  dtp_trigger_r: 2.0
  dtp_retrace: 0.20

# v98a: v97b + EntryEngine状态机 (SMC bounce确认)
v98a:
  <<: *defaults
  version: V98a
  description: "v97b+EntryEngine状态机: bounce确认入场+势态评分+动能衰减"
  # 核心: 启用入场状态机 (5阶段确认)
  enable_entry_engine: true
  # 有EntryEngine后bounce不需要60%(那是补偿缺状态机的), 30%够了
  require_double_touch: false
  breakeven_r: 0.5
  breakeven_lock_r: 0.2
  bounce_pct: 0.30
  max_concurrent: 1
  max_entry_offset_r: 0.5
  dtp_trigger_r: 3.0
  dtp_retrace: 0.20
  boost_in_1h_ob: 3.0
  # 势态动
  enable_state_filter: true
  enable_scoring: true
  min_score: 2
  enable_decay_exit: true
  decay_min_r: 1.0
  decay_bars: 3
  engulf_body_pct: 50
  trend_lookback: 80
  swing_strength: 3
  range_be_r: 1.0
  range_time_exit: 30
  trend_be_r: 0.5
  trend_be_lock: 0.2
  trend_dtp_retrace: 0.20

