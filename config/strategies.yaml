# MT5 Runner — 策略参数定义
# 每个策略版本一个顶层key，脚本通过 --strategy <key> 引用

defaults: &defaults
  # === OB检测 ===
  bounce_pct: 0.30
  timeout_min: 60
  max_entry_offset_r: 1.5
  entry_depth_pct: 0.0
  entry_depth_filter: true
  deep_entry_boost: 1.0
  entry_confirm_bars: 0
  bounce_close_confirm_bars: 0
  bounce_close_tf: 1
  bounce_close_buffer_pct: 0.0
  bounce_close_require_body: false
  enable_confirm_pullback: false
  confirm_pullback_pct: 0.50
  confirm_pullback_wait_sec: 30
  confirm_pullback_max_adverse_pct: 0.20
  enable_entry_momentum_filter: false
  entry_momentum_tf: 1
  entry_block_counter_strong: true
  entry_require_counter_weak: false
  require_double_touch: true
  double_touch_window_min: 60
  min_ob_spread_mult: 2.0
  min_risk_spread_ratio: 3.0
  min_abs_risk_usd: 0.0
  min_ob_body_pct: 50.0
  min_impulse_body_pct: 0.0
  min_impulse_vol_ratio: 0.0
  structure_break_bars: 0
  structure_break_atr: 0.0
  require_impulse_candle_dir: false
  enable_range_breakout: false
  range_breakout_only: false
  range_breakout_bars: 10
  range_breakout_max_atr: 1.20
  range_breakout_min_spread_mult: 3.0
  range_breakout_atr: 0.10
  range_breakout_tp_mult: 1.0
  range_breakout_body_dir: true
  enable_liquidity_sweep: false
  liquidity_sweep_only: false
  sweep_lookback_bars: 12
  sweep_max_range_atr: 2.50
  sweep_min_range_spread_mult: 4.0
  sweep_min_penetration_atr: 0.05
  sweep_min_wick_pct: 45.0
  sweep_tp_mult: 1.0
  no_ob_start_hour: 23
  no_ob_end_hour: 6
  min_ob_strength: 0.5
  max_risk_atr: 3.0
  max_counter_risk_atr: 1.5
  consolidate_ob: true
  spread_floor: 0.0
  impulse_atr_mult: 1.5
  impulse_lookback: 3
  atr_period: 14

  # === 止损 ===
  sl_buffer_atr: 0.10

  # === 保本 ===
  breakeven_r: 0.2
  breakeven_lock_r: 0.05
  early_loss_cut_r: 0.0
  mfe_fail_min_r: 0.0
  mfe_fail_exit_r: 0.0
  no_mfe_exit_bars: 0
  no_mfe_min_peak_r: 0.0
  no_mfe_exit_r: 0.0
  enable_failure_reverse: false
  reverse_on_early_loss: false
  reverse_on_mfe_fail: false
  reverse_on_no_mfe: false
  failure_reverse_risk_mult: 1.0
  failure_reverse_lot_mult: 1.0
  failure_reverse_tp_r: 0.0
  failure_reverse_allow_chain: false

  # === 追踪止损 ===
  trail_levels:
    - trigger_r: 1.0
      lock_r: 0.2
      lock_mult: 0.0
    - trigger_r: 2.5
      lock_r: 0.0
      lock_mult: 0.65
    - trigger_r: 0.0
      lock_r: 0.0
      lock_mult: 0.0

  # === DTP (Dynamic Take Profit) ===
  dtp_trigger_r: 1.5
  dtp_retrace: 0.30
  adaptive_dtp: true
  dtp_stage2_trigger_r: 0.0
  dtp_stage2_retrace: 0.0
  dtp_stage3_trigger_r: 0.0
  dtp_stage3_retrace: 0.0
  dtp_exit_mode: 0
  dtp_partial_pct: 50
  dtp_post_partial_retrace: 0.0
  dtp_post_partial_lock_r: 0.0
  dtp_reset_peak_after_partial: false

  # === 时间退出 ===
  time_exit_bars: 999
  time_decay_tp: false

  # === 仓位管理 ===
  risk_percent: 2.0
  fixed_lot_size: 0.0
  enable_pos_mult: true
  max_pos_mult: 0.0
  max_lot_size: 0.0
  max_concurrent: 5
  free_run_min_r: 0.0
  cooldown_bars: 0
  no_entry_hours: ""
  no_buy_hours: ""
  no_sell_hours: ""
  low_risk_hours: ""
  low_risk_hour_mult: 1.0
  high_risk_hours: ""
  high_risk_hour_mult: 1.0
  late_bounce_sec: 0
  late_bounce_mult: 1.0
  bounce_sweet_min_pct: 0.0
  bounce_sweet_max_pct: 0.0
  outside_bounce_sweet_mult: 1.0
  bad_risk_min: 0.0
  bad_risk_max: 0.0
  bad_risk_mult: 1.0
  large_risk_min: 0.0
  large_risk_mult: 1.0
  buy_min_strength: 0.0
  sell_min_strength: 0.0
  buy_pos_mult: 1.0
  sell_pos_mult: 1.0
  buy_be_r: 0.0
  buy_be_lock: 0.0
  sell_be_r: 0.0
  sell_be_lock: 0.0
  buy_dtp_trigger_r: 0.0
  buy_dtp_retrace: 0.0
  sell_dtp_trigger_r: 0.0
  sell_dtp_retrace: 0.0
  enable_strong_addon: false
  strong_addon_trigger_r: 1.0
  strong_addon_step_r: 1.0
  strong_addon_max_count: 0
  strong_addon_lot_mult: 0.5
  strong_addon_risk_mult: 0.5
  strong_addon_min_spread_ratio: 5.0
  close_retry_cooldown_sec: 0
  max_entries_per_ob: 1
  ob_reentry_cooldown_min: 0
  filter_cont_age_min_bars: 0
  filter_cont_age_max_bars: 0
  filter_cont_non_deep_only: false
  filter_buy_no_h1_min_pos_mult: 0.0
  filter_buy_no_h1_max_pos_mult: 0.0
  filter_buy_no_h1_pos_mult: 1.0

  # === 增强 ===
  boost_in_1h_ob: 3.0
  ds_weight: true
  dt_addon_boost: 0.0

  # === K线 ===
  bar_period_min: 1   # 1=M1, 5=M5
  bars: 300            # OBScanDepth=200 + ATR(14) + buffer
  ob_scan_depth: 200
  magic_number: 202605

  # === 诊断 ===
  enable_exit_debug: false
  enable_entry_debug: false

  # === 强弱转换/HTF目标 ===
  enable_momentum_regime: false
  weak_exit_min_r: 1.0
  weak_body_shrink_pct: 0.80
  weak_wick_body_ratio: 2.0
  strong_momentum_bars: 4
  strong_min_body_growth: 1.0
  strong_weak_reverse_body_pct: 25.0
  strong_max_pullback_pct: 35.0
  strong_dtp_retrace_mult: 1.50
  enable_htf_target: false
  htf_target_tf: 15
  htf_target_lookback: 96
  htf_swing_strength: 2
  htf_min_target_r: 2.0
  htf_max_target_r: 6.0
  htf_measured_move_r: 2.0
  htf_require_aligned: true
  htf_partial_r: 1.0
  htf_partial_pct: 50
  htf_skip_dtp: false
  htf_skip_trail: false
  htf_dtp_trigger_r: 0.0
  htf_dtp_retrace: 0.0
  htf_dtp_post_partial_retrace: 0.0
  partial_post_lock_r: 0.0
  partial_only_deep: false
  layered_entry_count: 0
  layered_spacing_pct: 0.33
  layered_lot_mult: 1.5
  layered_avg_tp_r: 0.0

# === 策略版本 ===

v96b:
  <<: *defaults
  version: V96b
  description: "M1+二推+BE0.2R+DTP1.5R+3xBoost"

v96b_live:
  <<: *defaults
  version: V96b-Live
  description: "V96b live调优: 放宽BE+收紧offset+限并发"
  max_entry_offset_r: 0.8
  breakeven_r: 0.5
  breakeven_lock_r: 0.15
  max_concurrent: 2

v98:
  <<: *defaults
  version: V98
  description: "势位态动四维: M15趋势+评分+态切换+动能衰减"
  # 势: M15趋势判定
  trend_lookback: 80
  swing_strength: 3
  # 态: 趋势/震荡切换
  enable_state_filter: true
  range_be_r: 1.0
  range_time_exit: 30
  trend_be_r: 0.5
  trend_be_lock: 0.2
  trend_dtp_retrace: 0.20
  # 位: 评分系统
  enable_scoring: true
  proximity_filter: 0
  proximity_atr: 1.0
  min_score: 2
  # 动: 动能衰减
  enable_decay_exit: true
  decay_min_r: 1.0
  decay_bars: 3
  engulf_body_pct: 50
  # 基础参数(调优)
  breakeven_r: 0.5
  breakeven_lock_r: 0.2
  max_entry_offset_r: 0.8
  max_concurrent: 2
  bounce_pct: 0.40
  dtp_trigger_r: 2.0
  dtp_retrace: 0.20

# v98a: v97b + EntryEngine状态机 (SMC bounce确认)
v98a:
  <<: *defaults
  version: V98a
  description: "v97b+EntryEngine状态机: bounce确认入场+势态评分+动能衰减"
  # 核心: 启用入场状态机 (5阶段确认)
  enable_entry_engine: true
  # 有EntryEngine后bounce不需要60%(那是补偿缺状态机的), 30%够了
  require_double_touch: false
  breakeven_r: 0.5
  breakeven_lock_r: 0.2
  bounce_pct: 0.30
  max_concurrent: 1
  max_entry_offset_r: 0.5
  dtp_trigger_r: 3.0
  dtp_retrace: 0.20
  boost_in_1h_ob: 3.0
  # 势态动
  enable_state_filter: true
  enable_scoring: true
  min_score: 2
  enable_decay_exit: true
  decay_min_r: 1.0
  decay_bars: 3
  engulf_body_pct: 50
  trend_lookback: 80
  swing_strength: 3
  range_be_r: 1.0
  range_time_exit: 30
  trend_be_r: 0.5
  trend_be_lock: 0.2
  trend_dtp_retrace: 0.20

# v98a_loose: v98a 放宽版 (score3+bounce30%+并发2)
v98a_loose:
  <<: *defaults
  version: V98a-L
  description: "v98a放宽: score3+bounce30%+并发2"
  enable_entry_engine: true
  require_double_touch: false
  breakeven_r: 0.5
  breakeven_lock_r: 0.2
  bounce_pct: 0.30
  max_concurrent: 2
  max_entry_offset_r: 0.5
  dtp_trigger_r: 3.0
  dtp_retrace: 0.20
  boost_in_1h_ob: 3.0
  enable_state_filter: true
  enable_scoring: true
  min_score: 3
  enable_decay_exit: true
  decay_min_r: 1.0
  decay_bars: 3
  engulf_body_pct: 50
  trend_lookback: 80
  swing_strength: 3
  range_be_r: 1.0
  range_time_exit: 30
  trend_be_r: 0.5
  trend_be_lock: 0.2
  trend_dtp_retrace: 0.20

# 调试: EntryEngine + 态过滤, 无评分
