# === 策略版本 ===

v96b:
  <<: *defaults
  version: V96b
  description: "M1+二推+BE0.2R+DTP1.5R+3xBoost"

v96b_live:
  <<: *defaults
  version: V96b-Live
  description: "V96b live调优: 放宽BE+收紧offset+限并发"
  max_entry_offset_r: 0.8
  breakeven_r: 0.5
  breakeven_lock_r: 0.15
  max_concurrent: 2

v98:
  <<: *defaults
  version: V98
  description: "势位态动四维: M15趋势+评分+态切换+动能衰减"
  # 势: M15趋势判定
  trend_lookback: 80
  swing_strength: 3
  # 态: 趋势/震荡切换
  enable_state_filter: true
  range_be_r: 1.0
  range_time_exit: 30
  trend_be_r: 0.5
  trend_be_lock: 0.2
  trend_dtp_retrace: 0.20
  # 位: 评分系统
  enable_scoring: true
  proximity_filter: 0
  proximity_atr: 1.0
  min_score: 2
  # 动: 动能衰减
  enable_decay_exit: true
  decay_min_r: 1.0
  decay_bars: 3
  engulf_body_pct: 50
  # 基础参数(调优)
  breakeven_r: 0.5
  breakeven_lock_r: 0.2
  max_entry_offset_r: 0.8
  max_concurrent: 2
  bounce_pct: 0.40
  dtp_trigger_r: 2.0
  dtp_retrace: 0.20

# v98a: v97b + EntryEngine状态机 (SMC bounce确认)
v98a:
  <<: *defaults
  version: V98a
  description: "v97b+EntryEngine状态机: bounce确认入场+势态评分+动能衰减"
  # 核心: 启用入场状态机 (5阶段确认)
  enable_entry_engine: true
  # 有EntryEngine后bounce不需要60%(那是补偿缺状态机的), 30%够了
  require_double_touch: false
  breakeven_r: 0.5
  breakeven_lock_r: 0.2
  bounce_pct: 0.30
  max_concurrent: 1
  max_entry_offset_r: 0.5
  dtp_trigger_r: 3.0
  dtp_retrace: 0.20
  boost_in_1h_ob: 3.0
  # 势态动
  enable_state_filter: true
  enable_scoring: true
  min_score: 2
  enable_decay_exit: true
  decay_min_r: 1.0
  decay_bars: 3
  engulf_body_pct: 50
  trend_lookback: 80
  swing_strength: 3
  range_be_r: 1.0
  range_time_exit: 30
  trend_be_r: 0.5
  trend_be_lock: 0.2
  trend_dtp_retrace: 0.20

# v98a_loose: v98a 放宽版 (score3+bounce30%+并发2)
v98a_loose:
  <<: *defaults
  version: V98a-L
