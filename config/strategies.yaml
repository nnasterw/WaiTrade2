# MT5 Runner — 策略参数定义
# 每个策略版本一个顶层key，脚本通过 --strategy <key> 引用

defaults: &defaults
  # === OB检测 ===
  bounce_pct: 0.30
  timeout_min: 60
  max_entry_offset_r: 1.5
  require_double_touch: true
  double_touch_window_min: 60
  min_ob_spread_mult: 2.0
  min_risk_spread_ratio: 3.0
  min_abs_risk_usd: 0.0
  consolidate_ob: true

  # === 止损 ===
  sl_buffer_atr: 0.10

  # === 保本 ===
  breakeven_r: 0.2
  breakeven_lock_r: 0.05

  # === 追踪止损 ===
  trail_levels:
    - trigger_r: 1.0
      lock_r: 0.2
      lock_mult: 0.0
    - trigger_r: 2.5
      lock_r: 0.0
      lock_mult: 0.65
    - trigger_r: 0.0
      lock_r: 0.0
      lock_mult: 0.0

  # === DTP (Dynamic Take Profit) ===
  dtp_trigger_r: 1.5
  dtp_retrace: 0.30
  adaptive_dtp: true

  # === 时间退出 ===
  time_exit_bars: 999
  time_decay_tp: false

  # === 仓位管理 ===
  risk_percent: 2.0
  max_concurrent: 5
  cooldown_bars: 0

  # === 增强 ===
  boost_in_1h_ob: 3.0
  ds_weight: true
  dt_addon_boost: 0.0

  # === K线 ===
  bar_period_min: 1   # 1=M1, 5=M5
  bars: 5000

# === 策略版本 ===

v96b:
  <<: *defaults
  version: V96b
  description: "M1+二推+BE0.2R+DTP1.5R+3xBoost"

v96b_live:
  <<: *defaults
  version: V96b-Live
  description: "V96b live调优: 放宽BE+收紧offset+限并发"
  max_entry_offset_r: 0.8
  breakeven_r: 0.5
  breakeven_lock_r: 0.15
  max_concurrent: 2

v95c:
  <<: *defaults
  version: V95c
  description: "M1+单推+BE0.3R+DTP2.0R"
  require_double_touch: false
  breakeven_r: 0.3
  breakeven_lock_r: 0.1
  dtp_trigger_r: 2.0
  dtp_retrace: 0.25
  boost_in_1h_ob: 1.0

v94a:
  <<: *defaults
  version: V94a
  description: "M5+二推+保守追踪"
  bar_period_min: 5
  trail_levels:
    - trigger_r: 1.5
      lock_r: 0.5
      lock_mult: 0.0
    - trigger_r: 3.0
      lock_r: 0.0
      lock_mult: 0.50
    - trigger_r: 0.0
      lock_r: 0.0
      lock_mult: 0.0
  dtp_trigger_r: 2.0
  max_concurrent: 3

# === 实验组 (基于v95c优化) ===

# ── 第二轮实验 (基于MFE分析) ──

# 实验E: Trail L1 lock提高 (0.2R→0.5R) — 直接改善24笔大残留交易
exp_e_l1lock:
  <<: *defaults
  version: ExpE-L1Lock
  description: "v95c+L1lock0.5R: 24笔MFE>1R的交易多锁0.3R"
  require_double_touch: false
  breakeven_r: 0.3
  breakeven_lock_r: 0.1
  trail_levels:
    - trigger_r: 1.0
      lock_r: 0.5
      lock_mult: 0.0
    - trigger_r: 2.5
      lock_r: 0.0
      lock_mult: 0.65
    - trigger_r: 0.0
      lock_r: 0.0
      lock_mult: 0.0
  dtp_trigger_r: 2.0
  dtp_retrace: 0.25
  boost_in_1h_ob: 1.0

# 实验F: 填补BE→L1空白，加中间档 (0.5R触发→0.25R锁定)
exp_f_midtrail:
  <<: *defaults
  version: ExpF-MidTrail
  description: "v95c+中间追踪: L1=0.5R→0.25R, L2=1.0R→0.5R, L3=2.5R→×0.65"
  require_double_touch: false
  breakeven_r: 0.3
  breakeven_lock_r: 0.1
  trail_levels:
    - trigger_r: 0.5
      lock_r: 0.25
      lock_mult: 0.0
    - trigger_r: 1.0
      lock_r: 0.5
      lock_mult: 0.0
    - trigger_r: 2.5
      lock_r: 0.0
      lock_mult: 0.65
  dtp_trigger_r: 2.0
  dtp_retrace: 0.25
  boost_in_1h_ob: 1.0

# 实验G: BE lock提高 (0.1R→0.15R) — 改善57笔BE-only交易
exp_g_belock:
  <<: *defaults
  version: ExpG-BELock
  description: "v95c+BE lock0.15R: 57笔BE单各多赚0.05R"
  require_double_touch: false
  breakeven_r: 0.3
  breakeven_lock_r: 0.15
  dtp_trigger_r: 2.0
  dtp_retrace: 0.25
  boost_in_1h_ob: 1.0

# v97a: E+F+G全组合
# BE lock 网格搜索
