schedules:
  r186_r196_season_guard:
    description: "R186 + R196 account-level season/regime guard proxy for BTC 720d"
    deposit: 200.0
    days: 720
    targets:
      profit_min: 90000.0
      daily_trades_min: 4.0
      require_non_negative_months: true
      monthly_profit_min: 0.01
    series:
      - name: R186
        strategy: v11_r186_j2_r185_ob8_tail_cut
        path: results/backtest/v11_r186_j2_r185_ob8_tail_cut_20260524.trades.csv
      - name: R196
        strategy: v11_r196_j2_r195_pt1_min300
        path: results/backtest/v11_r196_j2_r195_pt1_min300_20240602_20260523_20260524.trades.csv
    live_profile:
      symbol: BTCUSDm
      guard_overrides:
        low_balance_ob_bad_months: "11"
        low_balance_ob_bad_hours: "7,13,14,15,18,22"
        low_balance_ob_bad_max_month_start_balance: 2500.0
        low_balance_ob_bad_hour_mult: 0.0
        sweep_context_months: "3"
        sweep_context_max_day: 2
        sweep_context_min_month_start_balance: 100000.0
        sweep_context_no_hours: "0,1,6,23"
        monthly_profit_target_stop_pct: 3.0
        monthly_profit_target_stop_min_balance: 0.0
        monthly_profit_target_stop_max_balance: 2500.0
        monthly_profit_target_stop_months: "10,12"
        shared_monthly_guard: true
        shared_monthly_guard_key: "r186_r196_season_guard"
        shared_monthly_guard_debug: true
    drop_filters:
      - "monthnum=11;signal=ob;hour=7,13,14,15,18,22;max_start=2500"
      - "monthnum=3;signal=sweep;hour=0,1,6,23;min_start=100000;max_day=2"
    guards:
      guard_monthnums: [10, 12]
      guard_max_month_start_balance: 2500.0
      profit_target_stop_pct: 3.0
      profit_target_min_trades: 1

